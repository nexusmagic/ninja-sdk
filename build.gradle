plugins {
    id 'com.android.library' version '8.1.4'
    id 'org.jetbrains.kotlin.android' version '1.9.0'
    id 'maven-publish'
}

android {
    namespace 'com.nexusdeckpro.ninjasdk'
    compileSdk 34

    defaultConfig {
        minSdk 26
        targetSdk 34
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = 'com.github.nexusmagic'
                artifactId = 'ninja-sdk'
                version = '1.0.0'
            }
        }
    }
}
